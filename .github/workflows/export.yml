name: Deploy Godot Web

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Setup Godot
      uses: chickensoft-games/setup-godot@v1
      with:
        version: 4.3.0
        use-dotnet: false
        include-templates: true

    - name: Verify Project
      run: |
        cd client-godot
        godot --headless --check-only --quit

    - name: Export Web
      run: |
        cd client-godot
        mkdir -p exports/web
        godot --headless --export-release "Web" exports/web/index.html

    - name: Patch web export for GitHub Pages
      run: |
        # Download coi-serviceworker so GitHub Pages can serve the game without
        # requiring COOP/COEP headers (needed for SharedArrayBuffer / WebAssembly threads)
        curl -sSL "https://cdn.jsdelivr.net/npm/coi-serviceworker@0.1.7/coi-serviceworker.min.js" \
          -o client-godot/exports/web/coi-serviceworker.js
        # Inject the service-worker script before the Godot engine loader
        sed -i 's|<script src="index.js"></script>|<script src="coi-serviceworker.js"></script>\n\t\t<script src="index.js"></script>|' \
          client-godot/exports/web/index.html

    - name: Configure Pages
      uses: actions/configure-pages@v5

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: client-godot/exports/web

    - name: Sync gh-pages branch
      run: |
        set -euo pipefail

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        # gh-pages may not exist yet on the first deployment, so fetch failure is expected then.
        if git fetch origin gh-pages:refs/remotes/origin/gh-pages; then
          git worktree add /tmp/gh-pages origin/gh-pages
        else
          git worktree add /tmp/gh-pages HEAD
          cd /tmp/gh-pages
          git checkout --orphan gh-pages
        fi

        while IFS= read -r path; do
          rm -rf "${path}" || {
            echo "Failed to remove ${path} from gh-pages worktree." >&2
            exit 1
          }
        done < <(find /tmp/gh-pages -mindepth 1 -maxdepth 1 ! -name ".git" -print)

        cp -R client-godot/exports/web/. /tmp/gh-pages/
        touch /tmp/gh-pages/.nojekyll

        cd /tmp/gh-pages
        git add --all

        if git diff --cached --quiet; then
          echo "gh-pages is already up to date."
        else
          git commit -m "Deploy GitHub Pages from ${GITHUB_SHA}"
          git push origin HEAD:gh-pages
        fi

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

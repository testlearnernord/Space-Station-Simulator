name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  gdscript-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.3.0
          use-dotnet: false
          include-templates: false

      - name: Validate GDScript
        run: |
          cd client-godot
          godot --headless --check-only --quit

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore sim-core.Tests/sim-core.Tests.csproj

    - name: Build
      run: dotnet build sim-core.Tests/sim-core.Tests.csproj --no-restore

    - name: Test
      run: dotnet test sim-core.Tests/sim-core.Tests.csproj --no-build --verbosity normal
